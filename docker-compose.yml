services:
  postgres:
    image: postgres:16-alpine
    container_name: jinacampus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jinacampus
      POSTGRES_PASSWORD: jinacampus
      POSTGRES_DB: jinacampus
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - jinacampus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jinacampus -d jinacampus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jinacampus_pgdata:
